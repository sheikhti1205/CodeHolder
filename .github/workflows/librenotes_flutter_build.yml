name: Build LibreNotes Flutter

on:
  workflow_dispatch:
  push:
    paths:
      - "LibreNotesFlutter/**"
      - ".github/workflows/librenotes_flutter_build.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: LibreNotesFlutter

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Flutter stable
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 --branch stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: |
          flutter --version
          flutter doctor -v

      - name: Generate platform folders
        run: flutter create . --platforms=android,web

      - name: Fetch dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build Android debug APK
        run: flutter build apk --debug

      - name: Build web bundle
        run: flutter build web --release

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: librenotes-android-debug-apk
          path: LibreNotesFlutter/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: librenotes-web-build
          path: LibreNotesFlutter/build/web
          retention-days: 7
